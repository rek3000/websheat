<div id="todo-list" class="divide-y">
    {{range .Todos}}
    <div class="flex items-center justify-between p-4 hover:bg-gray-50">
        <div class="flex items-center gap-4">
            <button hx-put="/todos/{{.ID}}/toggle"
                    hx-target="#todo-list"
                    class="w-5 h-5 border rounded-md {{if .Completed}}bg-green-500 border-green-500{{else}}border-gray-300{{end}} 
                           focus:outline-none focus:ring-2 focus:ring-blue-500">
            </button>
            <span class="{{if .Completed}}line-through text-gray-500{{end}}">
                {{.Title}}
            </span>
        </div>
        <button hx-delete="/todos/{{.ID}}"
                hx-target="#todo-list"
                class="text-red-500 hover:text-red-700 focus:outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    {{else}}
    <div class="p-4 text-center text-gray-500">
        No todos yet. Add one above!
    </div>
    {{end}}
</div>
