<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://unpkg.com/htmx.org@1.9.6"></script>
  <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body class="">
  <div class="container mx-auto px-4 py-8 max-w-2xl">
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-center">
        Todo
      </h1>
    </header>
    <!-- Todo Form -->
    <div class="">
      <form hx-post="/todos" hx-target="#todo-list" hx-swap="outerHTML" class="">
        <div class="flex gap-4">
          <input type="text" name="title" placeholder="What needs to be done?"
            class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
          <button type="submit" class="">
            <button type="submit" class="btn btn-primary">
              Add
            </button>
        </div>
      </form>
    </div>

    <!-- Todo List -->
    <div id="todo-list" hx-get="/todos" hx-trigger="load" class="">
    </div>
  </div>
</body>

</html>
